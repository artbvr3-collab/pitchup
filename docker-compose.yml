# PITCHUP — production stack (Layer 10).
#
#   - db:    self-hosted Postgres 16 with a named volume + healthcheck.
#   - app:   the Next.js standalone image; runs `prisma migrate deploy` on start,
#            then serves :3000 (localhost-bound — Caddy fronts it).
#   - caddy: public entrypoint on :80/:443 (TLS via Cloudflare Origin cert),
#            reverse-proxies app:3000. Runs ONLY under the `prod` profile.
#   - cron:  run-only image for the 4 scheduled jobs (Layer 7b). Under the
#            `cron` profile (not started by `up`); the host crontab invokes it
#            via `docker compose run --rm cron <command>`. pg_dump backups are a
#            host crontab line too — see deploy/crontab.example + deploy/backup.sh.
#
# Local build-and-run:  cp .env.production.example .env && docker compose up --build
#   (no COMPOSE_PROFILES → caddy skipped; app on localhost:3000)
# Production (VPS):      docker compose pull && docker compose up -d
#   (COMPOSE_PROFILES=prod in .env → caddy included; prod pulls the GHCR image)

name: pitchup

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pitchup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-pitchup}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pitchup} -d ${POSTGRES_DB:-pitchup}"]
      interval: 5s
      timeout: 5s
      retries: 12
    # Intentionally NOT published to the host — reachable only on the
    # compose network as host `db`. The app connects via DATABASE_URL below.

  app:
    image: ${APP_IMAGE:-pitchup:local}
    # `build` is used by `docker compose build` / `up --build` for LOCAL runs.
    # Production deploys use the prebuilt image (`docker compose pull`).
    build:
      context: .
      # Explicit — the Dockerfile's LAST stage is `cron`, so without this the
      # app would build the wrong (cron) image.
      target: runner
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        NEXT_PUBLIC_ABLY_SUBSCRIBE_KEY: ${NEXT_PUBLIC_ABLY_SUBSCRIBE_KEY:-}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Points at the `db` service on the compose network.
      DATABASE_URL: postgresql://${POSTGRES_USER:-pitchup}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-pitchup}?schema=public
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in .env}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:?set AUTH_GOOGLE_ID in .env}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:?set AUTH_GOOGLE_SECRET in .env}
      # Auth.js v5 absolute callback base behind the proxy. trustHost is already
      # on; AUTH_URL removes ambiguity (see auth-config.ts + ADR-0006).
      AUTH_URL: ${AUTH_URL:-https://pitchup.online}
      # Server-side reads of NEXT_PUBLIC_APP_URL (email deep links) — keep equal
      # to the build-arg value used for the client bundle.
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://pitchup.online}
      EMAIL_TRANSPORT: ${EMAIL_TRANSPORT:-console}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-}
      ABLY_API_KEY: ${ABLY_API_KEY:-}
      NEXT_PUBLIC_ABLY_SUBSCRIBE_KEY: ${NEXT_PUBLIC_ABLY_SUBSCRIBE_KEY:-}
      # Cloudflare R2 (venue photo uploads) — all optional; absent → the admin
      # upload route returns 503 and the form falls back to paste-a-URL.
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL:-}
    ports:
      # Bind to localhost only — Caddy is the public entrypoint (prod profile).
      # Harmless in prod (not externally reachable); handy for `curl localhost:3000`.
      - "127.0.0.1:3000:3000"

  # Public entrypoint. Runs ONLY under the `prod` profile — set
  # COMPOSE_PROFILES=prod in the VPS .env so `docker compose up -d` includes it.
  # Locally (no profile) Caddy is skipped and you hit the app on localhost:3000.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    profiles: ["prod"]
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      CADDY_SITE_ADDRESS: ${CADDY_SITE_ADDRESS:-pitchup.online}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/certs:/etc/caddy/certs:ro
      - caddy_data:/data
      - caddy_config:/config

  # Scheduled jobs (Layer 7b crons). NOT long-running — invoked on demand by the
  # host crontab via `docker compose run --rm cron <command>`. Under the `cron`
  # profile so `docker compose up` never starts it; `run` targets it explicitly.
  cron:
    image: ${CRON_IMAGE:-pitchup-cron:local}
    build:
      context: .
      target: cron
    profiles: ["cron"]
    restart: "no"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-pitchup}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-pitchup}?schema=public
      # env.ts validates AUTH_* at import even though the crons never use them.
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in .env}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:?set AUTH_GOOGLE_ID in .env}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:?set AUTH_GOOGLE_SECRET in .env}
      # Morning-reminder email: deep-link base + transport selection.
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://pitchup.online}
      EMAIL_TRANSPORT: ${EMAIL_TRANSPORT:-console}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-}

volumes:
  pgdata:
  caddy_data:
  caddy_config:
