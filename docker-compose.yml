# PITCHUP — production stack (Layer 10).
#
# 10a (this slice): db + app.
#   - db:  self-hosted Postgres 16 with a named volume + healthcheck.
#   - app: the Next.js standalone image; runs `prisma migrate deploy` on start,
#          then serves on :3000 (bound to localhost — Caddy fronts it in 10b).
# 10b will add a `caddy` service taking over :80/:443 and reverse-proxying app.
# 10c will add a `cron` service for the 4 scheduled jobs + pg_dump backups.
#
# Local build-and-run:  cp .env.production.example .env && docker compose up --build
# Production (VPS):      docker compose pull && docker compose up -d
#   (prod pulls the prebuilt GHCR image named by APP_IMAGE; it does not build.)

name: pitchup

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pitchup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-pitchup}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pitchup} -d ${POSTGRES_DB:-pitchup}"]
      interval: 5s
      timeout: 5s
      retries: 12
    # Intentionally NOT published to the host — reachable only on the
    # compose network as host `db`. The app connects via DATABASE_URL below.

  app:
    image: ${APP_IMAGE:-pitchup:local}
    # `build` is used by `docker compose build` / `up --build` for LOCAL runs.
    # Production deploys use the prebuilt image (`docker compose pull`).
    build:
      context: .
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        NEXT_PUBLIC_ABLY_SUBSCRIBE_KEY: ${NEXT_PUBLIC_ABLY_SUBSCRIBE_KEY:-}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Points at the `db` service on the compose network.
      DATABASE_URL: postgresql://${POSTGRES_USER:-pitchup}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-pitchup}?schema=public
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in .env}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:?set AUTH_GOOGLE_ID in .env}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:?set AUTH_GOOGLE_SECRET in .env}
      # Server-side reads of NEXT_PUBLIC_APP_URL (email deep links) — keep equal
      # to the build-arg value used for the client bundle.
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://pitchup.online}
      EMAIL_TRANSPORT: ${EMAIL_TRANSPORT:-console}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-}
      ABLY_API_KEY: ${ABLY_API_KEY:-}
      NEXT_PUBLIC_ABLY_SUBSCRIBE_KEY: ${NEXT_PUBLIC_ABLY_SUBSCRIBE_KEY:-}
    ports:
      # Bind to localhost only — Caddy (10b) will be the public entrypoint.
      - "127.0.0.1:3000:3000"

volumes:
  pgdata:
