# PITCHUP — CI/CD (Layer 10d).
#
# Flow: push to main → CI gate (typecheck + tests) → build & push the app + cron
# images to GHCR → SSH to the VPS and `docker compose pull && up -d`.
#
# Pull requests run the CI gate ONLY. The deploy job is skipped until the repo
# variable DEPLOY_ENABLED=true is set (so CI stays green before the VPS exists).
#
# Required repository configuration (Settings → Secrets and variables → Actions):
#   Variables:
#     NEXT_PUBLIC_APP_URL   — public origin baked into the client bundle
#                             (default https://pitchup.online if unset)
#     DEPLOY_ENABLED        — "true" to enable the SSH deploy job
#   Secrets:
#     NEXT_PUBLIC_ABLY_SUBSCRIBE_KEY — Ably subscribe-only key (optional)
#     DEPLOY_SSH_HOST       — VPS host/IP
#     DEPLOY_SSH_USER       — VPS ssh user (e.g. deploy)
#     DEPLOY_SSH_KEY        — private key authorized on the VPS
#
# The VPS must be able to `docker compose pull` the images: either make the GHCR
# packages public, or `docker login ghcr.io` once on the VPS with a
# read:packages PAT. See docs/deploy-runbook.md.
#
# RELATED DOCS: docs/adr/0006-deploy-topology.md, docs/deploy-runbook.md

name: deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: CI gate (typecheck + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Generate the Prisma client so tsc sees the typed model accessors.
      # `prisma generate` reads only the schema — no DATABASE_URL needed.
      - run: pnpm exec prisma generate

      - run: pnpm typecheck

      - run: pnpm test

  build:
    name: Build & push images (GHCR)
    needs: ci
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # GHCR image refs must be all-lowercase; the owner login may contain caps.
      - id: meta
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runner
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/pitchup:latest
            ghcr.io/${{ steps.meta.outputs.owner }}/pitchup:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL || 'https://pitchup.online' }}
            NEXT_PUBLIC_ABLY_SUBSCRIBE_KEY=${{ secrets.NEXT_PUBLIC_ABLY_SUBSCRIBE_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push cron image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: cron
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/pitchup-cron:latest
            ghcr.io/${{ steps.meta.outputs.owner }}/pitchup-cron:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Pull latest images on the VPS and recreate
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
        run: |
          install -m 600 -D /dev/stdin "$HOME/.ssh/id_deploy" <<< "$SSH_KEY"
          ssh -i "$HOME/.ssh/id_deploy" -o StrictHostKeyChecking=accept-new \
            "$SSH_USER@$SSH_HOST" '
              set -e
              cd /opt/pitchup
              git pull --ff-only
              docker compose pull
              docker compose pull cron
              docker compose up -d
              docker image prune -f
            '
